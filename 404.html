<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        (function () {
            var path = window.location.pathname;
            var repoBase = "/mouhamad.github.io";
            var route = path.indexOf(repoBase) === 0 ? path.slice(repoBase.length) : path;
            route = route.replace(/\/+$/, "");

            var pageMap = {
                "/": "/",
                "": "/",
                "/about": "/about/",
                "/contact": "/contact/",
                "/initiatives": "/initiatives/",
                "/momo": "/momo/",
                "/photography": "/photography/",
                "/sports": "/sports/",
                "/writings": "/writings/",
                "/writing-01": "/writings/writing-01.html",
                "/writing-02": "/writings/writing-02.html",
                "/writing-03": "/writings/writing-03.html"
            };

            var target = pageMap[route];
            if (target) {
                window.location.replace(repoBase + target + window.location.search + window.location.hash);
            }
        })();
    </script>
</head>
<body>
</body>
</html>
